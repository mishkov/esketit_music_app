name: esketit_music_app
description: "A new Flutter project."
publish_to: 'none'
version: 2.3.3+19

environment:
  sdk: ^3.11.1

dependencies:
  bloc: ^9.2.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  file_picker: ^10.3.3
  http: ^1.5.0
  intl: ^0.20.2
  just_audio: ^0.10.5
  just_audio_background: 0.0.1-beta.17
  marquee: ^2.3.0
  meta: ^1.17.0
  package_info_plus: ^9.0.0
  sentry_flutter: ^9.14.0
  shared_preferences: ^2.5.4
  web: ^1.1.1

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
